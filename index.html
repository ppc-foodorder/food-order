<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comanda mancare</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
#view-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 360px; text-align: center; }
.login-icon { width: 56px; height: 56px; background: #0f6e56; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 26px; margin: 0 auto 20px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-sub { font-size: 14px; color: #888; margin-bottom: 24px; }
.login-error { font-size: 13px; color: #a32d2d; background: #fcebeb; border-radius: 8px; padding: 8px 12px; margin-bottom: 14px; display: none; }
.login-input-wrap { position: relative; margin-bottom: 14px; }
.login-input-wrap input { width: 100%; padding: 10px 40px 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.login-input-wrap input:focus { border-color: #0f6e56; }
.toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px; padding: 0; }
.topbar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.app-icon { width: 32px; height: 32px; background: #0f6e56; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0; }
.app-title { font-size: 15px; font-weight: 600; }
.app-sub { font-size: 11px; color: #888; }
.active-count { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; background: #e1f5ee; color: #0f6e56; }
.container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
.optional-tag { font-size: 11px; color: #aaa; font-weight: 400; margin-left: 3px; }
input[type=text], input[type=number], input[type=url] { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; background: #fff; }
input:focus { border-color: #0f6e56; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
.mb10 { margin-bottom: 10px; }
.btn { padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; border: none; transition: opacity 0.1s, background 0.15s; display: inline-flex; align-items: center; gap: 5px; }
.btn-green { background: #0f6e56; color: #fff; }
.btn-green:hover:not(:disabled) { background: #085041; }
.btn-green:disabled { background: #7db8ae; cursor: not-allowed; }
input:disabled { background: #f5f5f5; color: #aaa; }
.btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
.btn-outline:hover { background: #f5f5f5; }
.btn-red { background: #fff; border: 1px solid #f09595; color: #a32d2d; }
.btn-red:hover { background: #fcebeb; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.new-order-card { border: 2px dashed #c8e6de; border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; background: #fafcfb; }
.new-order-title { font-size: 13px; font-weight: 700; color: #0f6e56; margin-bottom: 14px; }
.order-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.order-card-header { padding: 14px 18px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid #f0f0f0; gap: 10px; }
.order-restaurant { font-size: 16px; font-weight: 700; }
.order-meta { font-size: 12px; color: #888; margin-top: 3px; }
.menu-link { font-size: 12px; color: #185fa5; text-decoration: none; display: inline-block; margin-top: 5px; }
.menu-link:hover { text-decoration: underline; }
.status-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
.pill-open { background: #e1f5ee; color: #0f6e56; }
.pill-closed { background: #f0f0f0; color: #888; }
.order-card-body { padding: 14px 18px; }
.order-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.order-row:last-child { border-bottom: none; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #e1f5ee; color: #0f6e56; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.order-info { flex: 1; min-width: 0; }
.order-name { font-size: 13px; font-weight: 600; }
.order-item-txt { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.order-price { font-size: 13px; font-weight: 700; min-width: 54px; text-align: right; }
.del-btn { background: none; border: none; cursor: pointer; color: #ddd; font-size: 18px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
.del-btn:hover { color: #e24b4a; }
.icon-btn { background: none; border: 1px solid transparent; border-radius: 5px; cursor: pointer; font-size: 14px; line-height: 1; padding: 3px 5px; flex-shrink: 0; transition: all 0.1s; }
.edit-btn { color: #aaa; }
.edit-btn:hover { color: #185fa5; border-color: #b5d4f4; background: #e6f1fb; }
.del-btn2 { color: #ccc; }
.del-btn2:hover { color: #a32d2d; border-color: #f09595; background: #fcebeb; }
.confirm-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; background: #fff; font-family: inherit; font-weight: 500; white-space: nowrap; }
.confirm-btn:hover { background: #e1f5ee; border-color: #0f6e56; color: #0f6e56; }
.confirm-btn.confirmed { background: #e1f5ee; border-color: #9FE1CB; color: #0f6e56; cursor: default; }
.metric { background: #f8f8f8; border-radius: 8px; padding: 10px; text-align: center; }
.metric-val { font-size: 20px; font-weight: 700; }
.metric-lbl { font-size: 11px; color: #888; margin-top: 2px; }
.add-form { background: #f8faf9; border: 1px solid #d4ede5; border-radius: 10px; padding: 14px; margin-top: 14px; }
.add-form-title { font-size: 12px; font-weight: 700; color: #0f6e56; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.owner-section { border-top: 2px solid #0f6e56; padding: 14px 18px; background: #f8faf9; }
.owner-label { font-size: 11px; font-weight: 700; color: #0f6e56; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; color: #555; }
.summary-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; padding-top: 10px; margin-top: 6px; border-top: 1px solid #e8e8e8; }
.summary-box { background: #f8f8f8; border-radius: 8px; padding: 12px; margin-top: 12px; }
.empty { text-align: center; padding: 20px; color: #bbb; font-size: 13px; }
.loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #0f6e56; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fcebeb; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #a32d2d; margin-bottom: 16px; }
.saving-ind { font-size: 12px; color: #888; display: none; align-items: center; gap: 4px; }
.saving-ind.on { display: inline-flex; }
</style>
</head>
<body>

<div id="view-login">
  <div class="login-card">
    <div class="login-icon">&#127829;</div>
    <div class="login-title">Comanda mancare</div>
    <div class="login-sub">Introdu parola echipei pentru a continua</div>
    <div class="login-error" id="login-error">Parola incorecta. Incearca din nou.</div>
    <div class="login-input-wrap">
      <input type="password" id="inp-password" placeholder="Parola" onkeydown="if(event.key==='Enter') checkPassword()" />
      <button class="toggle-pw" onclick="togglePw()">&#128065;</button>
    </div>
    <button class="btn btn-green" style="width:100%" onclick="checkPassword()">Intra</button>
  </div>
</div>

<div id="main-app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="app-icon">&#127829;</div>
      <div>
        <div class="app-title">Comanda mancare</div>
        <div class="app-sub" id="topbar-sub">Se incarca...</div>
      </div>
    </div>
    <span class="active-count" id="active-count" style="display:none"></span>
  </div>
  <div class="container">
    <div id="loading-view" class="loading"><span class="spinner"></span> Se incarca...</div>
    <div id="error-view" style="display:none">
      <div class="error-box" id="error-msg"></div>
      <button class="btn btn-outline" onclick="loadState()">Reincearca</button>
    </div>
    <div id="main-view" style="display:none">
      <div class="new-order-card">
        <div class="new-order-title">+ Deschide comanda noua</div>
        <div class="grid2">
          <div><label>Restaurant</label><input type="text" id="inp-restaurant" placeholder="ex: Pizza Hut" /></div>
          <div><label>Numele tau</label><input type="text" id="inp-owner" placeholder="ex: Razvan" /></div>
        </div>
        <div class="mb10">
          <label>Link meniu <span class="optional-tag">(optional)</span></label>
          <input type="url" id="inp-menulink" placeholder="ex: https://pizzahut.ro/meniu" />
        </div>
        <div class="actions">
          <button class="btn btn-green btn-sm" id="btn-start-new" onclick="startOrder()">Deschide comanda</button>
          <span class="saving-ind" id="saving-new"><span class="spinner" style="width:13px;height:13px;border-width:2px;margin-right:0"></span> Se salveaza...</span>
        </div>
      </div>
      <div id="orders-container"></div>
    </div>
  </div>
</div>

<script>
const MASTER_KEY = '$2a$10$2kMm5ORo2rd3sv6H7Sh70unZ0dvp.kRY8LkLTrx4mzmRRsAu0TYLa';
const BIN_ID = '69ce325d36566621a870d3ef';
const APP_PASSWORD = 'Mancare2025!';

let localState = null;
let lastHash = '';
let pollInterval = null;
let saving = {};
let myName = localStorage.getItem('fo_name') || '';
let ownedIds = JSON.parse(localStorage.getItem('fo_owned') || '[]');
// Cheie unica per browser - identifica userul fara login
let myKey = localStorage.getItem('fo_key');
if (!myKey) { myKey = Date.now().toString(36) + Math.random().toString(36).slice(2); localStorage.setItem('fo_key', myKey); }

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadState();
});

async function api(url, method, body) {
  const r = await fetch(url, {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY, 'X-Bin-Versioning': 'false' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function getState() {
  const d = await api(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`);
  localState = d.record || { sessions: [] };
  return localState;
}

async function putState(s) {
  localState = s;
  await api(`https://api.jsonbin.io/v3/b/${BIN_ID}`, 'PUT', s);
}

async function loadState() {
  if (!localState) { showEl('loading-view', true); showEl('main-view', false); showEl('error-view', false); }
  try {
    await getState();
    render();
    showEl('loading-view', false); showEl('main-view', true); showEl('error-view', false);
    poll();
  } catch(e) {
    if (!localState) { showEl('loading-view', false); showEl('error-view', true); document.getElementById('error-msg').textContent = 'Eroare la incarcare. Verifica conexiunea.'; }
  }
}

function render() {
  const hash = JSON.stringify(localState);
  if (hash === lastHash) return;
  lastHash = hash;
  const sessions = (localState.sessions || []);
  const openN = sessions.filter(s => s.status === 'open').length;
  document.getElementById('topbar-sub').textContent = openN ? openN + ' comand' + (openN===1?'a':'i') + ' active' : 'Nicio comanda activa';
  const ac = document.getElementById('active-count');
  ac.style.display = openN ? 'inline-block' : 'none';
  ac.textContent = openN + ' active';

  // Prefill owner name
  const ownerInp = document.getElementById('inp-owner');
  if (ownerInp && !ownerInp.value && myName) ownerInp.value = myName;

  const sorted = [...sessions].sort((a,b) => {
    if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
    return new Date(b.openedAt) - new Date(a.openedAt);
  });
  const c = document.getElementById('orders-container');
  c.innerHTML = '';
  if (!sorted.length) { c.innerHTML = '<div class="empty" style="padding:30px 0">Nicio comanda deschisa. Fii primul!</div>'; return; }
  sorted.forEach(s => c.appendChild(makeCard(s)));
}

function makeCard(session) {
  const owned = ownedIds.includes(session.id);
  const open = session.status === 'open';
  const orders = session.orders || [];
  const total = orders.reduce((s,o) => s + parseFloat(o.price||0), 0);

  const div = document.createElement('div');
  div.className = 'order-card';

  const menuHtml = session.menuLink
    ? `<a href="${esc(session.menuLink)}" target="_blank" class="menu-link">&#128279; Vezi meniu</a>` : '';

  let orderRowsHtml = orders.length ? orders.map(o => `
    <div class="order-row" id="row-${o.id}">
      <div class="avatar">${ini(o.name)}</div>
      <div class="order-info"><div class="order-name">${esc(o.name)}</div><div class="order-item-txt">${esc(o.item)}</div></div>
      <div class="order-price">${o.price} RON</div>
      ${open && (o.ownerKey === myKey || owned) ? `
        <button class="icon-btn edit-btn" onclick="startEditOrder('${session.id}','${o.id}')" title="Editeaza">&#9998;</button>
        <button class="icon-btn del-btn2" onclick="delOrder('${session.id}','${o.id}')" title="Sterge">&#215;</button>
      ` : ''}
    </div>`).join('') : '<div class="empty">Nicio comanda inca.</div>';

  const metricsHtml = orders.length ? `<div class="grid3">
    <div class="metric"><div class="metric-val">${orders.length}</div><div class="metric-lbl">persoane</div></div>
    <div class="metric"><div class="metric-val">${total.toFixed(0)}</div><div class="metric-lbl">total RON</div></div>
    <div class="metric"><div class="metric-val">${(total/orders.length).toFixed(0)}</div><div class="metric-lbl">medie/pers</div></div>
  </div>` : '';

  const addFormHtml = open ? `<div class="add-form">
    <div class="add-form-title">Adauga comanda ta</div>
    <div class="grid2">
      <div><label>Numele tau</label><input type="text" id="n-${session.id}" placeholder="ex: Ioana" value="${esc(myName)}" oninput="saveName(this.value)" /></div>
      <div><label>Pret (RON) <span style="font-size:10px;color:#b36200;font-weight:500" title="Include transport, ambalaj etc.">&#9888; incl. extras</span></label><input type="number" id="p-${session.id}" placeholder="ex: 35" min="0" step="1" /></div>
    </div>
    <div class="mb10"><label>Ce vrei sa comanzi</label>
      <input type="text" id="i-${session.id}" placeholder="ex: Burger meniu mare" onkeydown="if(event.key==='Enter')addOrder('${session.id}')" />
    </div>
    <div class="actions">
      <button class="btn btn-green btn-sm" id="btn-add-${session.id}" onclick="addOrder('${session.id}')">Adauga comanda</button>
      <span class="saving-ind" id="saving-${session.id}"><span class="spinner" style="width:12px;height:12px;border-width:2px;margin-right:0"></span> Se trimite...</span>
    </div>
  </div>` : '';

  let ownerHtml = '';
  if (owned) {
    if (open) {
      ownerHtml = `<div class="owner-section">
        <div class="owner-label">&#9679; Organizator</div>
        <button class="btn btn-red btn-sm" onclick="closeSession('${session.id}')">Inchide comanda</button>
      </div>`;
    } else {
      const payRows = orders.map(o => `<div class="order-row">
        <div class="avatar">${ini(o.name)}</div>
        <div class="order-info"><div class="order-name">${esc(o.name)}</div><div class="order-item-txt">${esc(o.item)} &middot; ${o.price} RON</div></div>
        <button class="confirm-btn ${o.paid?'confirmed':''}" onclick="togglePaid('${session.id}','${o.id}')" ${o.paid?'disabled':''}>
          ${o.paid?'&#10003; Platit':'Confirma plata'}
        </button>
      </div>`).join('');
      const sumRows = orders.map(o => `<div class="summary-row"><span>${esc(o.name)} — ${esc(o.item)}</span><span>${o.price} RON</span></div>`).join('');
      ownerHtml = `<div class="owner-section">
        <div class="owner-label">&#9679; Confirmare plati</div>
        ${payRows}
        <div class="summary-box">${sumRows}<div class="summary-total"><span>Total</span><span>${total.toFixed(0)} RON</span></div></div>
        <div style="margin-top:14px">
          <div class="owner-label" style="margin-bottom:8px">&#128247; Poza bon / confirmare <span style="font-size:11px;color:#888;font-weight:400">(optional)</span></div>
          ${session.bonusPhoto ? `<div style="margin-bottom:10px"><img src="${session.bonusPhoto}" style="max-width:100%;border-radius:8px;border:1px solid #e8e8e8" /></div>` : ''}
          <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#185fa5;background:#e6f1fb;border:1px solid #b5d4f4;padding:6px 14px;border-radius:8px">
            &#128247; ${session.bonusPhoto ? 'Schimba poza' : 'Adauga poza'}
            <input type="file" accept="image/*" style="display:none" onchange="uploadPhoto('${session.id}', this)" />
          </label>
        </div>
        <div class="actions"><button class="btn btn-outline btn-sm" onclick="removeSession('${session.id}')">Arhiveaza / Sterge</button></div>
      </div>`;
    }
  }

  div.innerHTML = `
    <div class="order-card-header">
      <div><div class="order-restaurant">${esc(session.restaurant)}</div>
        <div class="order-meta">Deschis de ${esc(session.openedBy)} &middot; ${fmtTime(session.openedAt)}</div>
        ${menuHtml}
      </div>
      <span class="status-pill ${open?'pill-open':'pill-closed'}">${open?'&#9679; Deschis':'&#9679; Inchis'}</span>
    </div>
    <div class="order-card-body">${orderRowsHtml}${metricsHtml}${addFormHtml}</div>
    ${ownerHtml}`;
  return div;
}

// FIX RACE CONDITION: toate actiunile fac GET proaspat inainte de PUT
// astfel nu se suprascriu date adaugate de alti useri intre timp
async function freshGet() {
  // Intotdeauna citim cea mai recenta versiune de pe server inainte de orice modificare
  return await getState();
}

async function startOrder() {
  const rest = document.getElementById('inp-restaurant').value.trim();
  const own = document.getElementById('inp-owner').value.trim();
  const link = document.getElementById('inp-menulink').value.trim();
  if (!rest || !own) { alert('Completeaza restaurantul si numele tau.'); return; }
  if (saving['new']) return;
  saving['new'] = true;
  const startBtn = document.getElementById('btn-start-new');
  if (startBtn) { startBtn.disabled = true; startBtn.textContent = 'Se deschide...'; startBtn.style.opacity = '0.6'; }
  saveName(own);
  const sid = Date.now().toString();
  // GET proaspat — prinde orice sesiuni adaugate de altii
  const st = await freshGet();
  st.sessions = st.sessions || [];
  st.sessions.push({ id: sid, restaurant: rest, openedBy: own, menuLink: link || null, openedAt: new Date().toISOString(), status: 'open', orders: [] });
  ownedIds.push(sid);
  localStorage.setItem('fo_owned', JSON.stringify(ownedIds));
  document.getElementById('inp-restaurant').value = '';
  document.getElementById('inp-menulink').value = '';
  lastHash = ''; render();
  try { await putState(st); } catch(e) { alert('Eroare la salvare.'); }
  const sbtn = document.getElementById('btn-start-new');
  if (sbtn) { sbtn.disabled = false; sbtn.textContent = 'Deschide comanda'; sbtn.style.opacity = '1'; }
  saving['new'] = false;
}

async function addOrder(sid) {
  const n = document.getElementById('n-'+sid)?.value.trim();
  const it = document.getElementById('i-'+sid)?.value.trim();
  const pr = parseFloat(document.getElementById('p-'+sid)?.value);
  if (!n || !it || isNaN(pr) || pr < 0) { alert('Completeaza toate campurile.'); return; }
  if (saving[sid]) return;

  // Dezactiveaza butonul SI campurile IMEDIAT - previne dubla trimitere
  saving[sid] = true;
  const btn = document.getElementById('btn-add-'+sid);
  if (btn) { btn.disabled = true; btn.textContent = 'Se trimite...'; btn.style.opacity = '0.6'; }
  const iEl = document.getElementById('i-'+sid);
  const pEl = document.getElementById('p-'+sid);
  const nEl = document.getElementById('n-'+sid);
  if (iEl) iEl.disabled = true;
  if (pEl) pEl.disabled = true;
  if (nEl) nEl.disabled = true;

  saveName(n);
  try {
    const st = await freshGet();
    const ses = st.sessions.find(s => s.id === sid);
    if (!ses || ses.status !== 'open') { alert('Comanda nu mai este activa.'); loadState(); }
    else {
      ses.orders = ses.orders || [];
      ses.orders.push({ id: Date.now().toString(), name: n, item: it, price: pr.toFixed(0), paid: false, ownerKey: myKey });
      lastHash = ''; render();
      await putState(st);
    }
  } catch(e) {
    alert('Eroare la salvare. Incearca din nou.');
    // Re-activeaza la eroare ca sa poata incerca din nou
    if (btn) { btn.disabled = false; btn.textContent = 'Adauga comanda'; btn.style.opacity = '1'; }
    if (iEl) { iEl.disabled = false; iEl.value = it || ''; }
    if (pEl) { pEl.disabled = false; pEl.value = pr || ''; }
    if (nEl) nEl.disabled = false;
  }
  saving[sid] = false;
  // render() va reconstrui formularul curat
}

// Edit inline pentru orice user (nu doar organizator)
function startEditOrder(sid, oid) {
  const ses = (localState.sessions||[]).find(s => s.id === sid);
  if (!ses) return;
  const o = (ses.orders||[]).find(o => o.id === oid);
  if (!o) return;
  const row = document.getElementById('row-'+oid);
  if (!row) return;
  row.innerHTML = `
    <div class="avatar">${ini(o.name)}</div>
    <div class="order-info" style="flex:1">
      <input type="text" id="edit-item-${oid}" value="${esc(o.item)}" style="margin-bottom:4px" />
      <input type="number" id="edit-price-${oid}" value="${o.price}" min="0" step="1" style="max-width:100px" />
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="btn btn-green btn-sm" style="padding:5px 10px" onclick="saveEditOrder('${sid}','${oid}')">&#10003;</button>
      <button class="btn btn-outline btn-sm" style="padding:5px 10px" onclick="cancelEdit('${sid}','${oid}')">&#215;</button>
    </div>`;
}

async function saveEditOrder(sid, oid) {
  const newItem = document.getElementById('edit-item-'+oid)?.value.trim();
  const newPrice = parseFloat(document.getElementById('edit-price-'+oid)?.value);
  if (!newItem || isNaN(newPrice) || newPrice < 0) { alert('Completeaza campurile corect.'); return; }
  if (saving[sid]) return;
  saving[sid] = true;
  const st = await freshGet();
  const ses = st.sessions.find(s => s.id === sid);
  if (ses) { const o = ses.orders.find(o => o.id === oid); if (o) { o.item = newItem; o.price = newPrice.toFixed(0); } }
  lastHash = ''; render();
  try { await putState(st); } catch(e) { alert('Eroare.'); }
  saving[sid] = false;
}

function cancelEdit(sid, oid) {
  lastHash = ''; render();
}

async function delOrder(sid, oid) {
  if (!confirm('Stergi aceasta comanda?')) return;
  if (saving[sid]) return;
  saving[sid] = true;
  const st = await freshGet();
  const ses = st.sessions.find(s => s.id === sid);
  if (ses) ses.orders = ses.orders.filter(o => o.id !== oid);
  lastHash = ''; render();
  try { await putState(st); } catch(e) { alert('Eroare.'); }
  saving[sid] = false;
}

async function closeSession(sid) {
  if (!confirm('Inchizi comanda? Colegii nu mai pot adauga comenzi.')) return;
  if (saving[sid]) return;
  saving[sid] = true;
  const st = await freshGet();
  const ses = st.sessions.find(s => s.id === sid);
  if (ses) ses.status = 'closed';
  lastHash = ''; render();
  try { await putState(st); } catch(e) { alert('Eroare.'); }
  saving[sid] = false;
}

async function togglePaid(sid, oid) {
  if (saving[sid]) return;
  saving[sid] = true;
  const st = await freshGet();
  const ses = st.sessions.find(s => s.id === sid);
  if (ses) { const o = ses.orders.find(o => o.id === oid); if (o) o.paid = true; }
  lastHash = ''; render();
  try { await putState(st); } catch(e) { alert('Eroare.'); }
  saving[sid] = false;
}

async function removeSession(sid) {
  if (!confirm('Arhivezi si stergi aceasta comanda? Nu va mai fi vizibila.')) return;
  if (saving[sid]) return;
  saving[sid] = true;
  const st = await freshGet();
  st.sessions = st.sessions.filter(s => s.id !== sid);
  ownedIds = ownedIds.filter(id => id !== sid);
  localStorage.setItem('fo_owned', JSON.stringify(ownedIds));
  lastHash = ''; render();
  try { await putState(st); } catch(e) { alert('Eroare.'); }
  saving[sid] = false;
}

async function uploadPhoto(sid, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('Poza prea mare. Maxim 2MB.'); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    const st = await freshGet();
    const ses = st.sessions.find(s => s.id === sid);
    if (ses) ses.bonusPhoto = e.target.result;
    lastHash = ''; render();
    try { await putState(st); } catch(err) { alert('Eroare la salvare poza.'); }
  };
  reader.readAsDataURL(file);
}

function saveName(n) { if (n) { myName = n; localStorage.setItem('fo_name', n); } }
function setSaving(id, on) { const el = document.getElementById('saving-'+id); if (el) el.className = 'saving-ind' + (on?' on':''); }
function ini(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(iso) { if (!iso) return ''; const d = new Date(iso); return d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}); }
function showEl(id, on) { document.getElementById(id).style.display = on ? 'block' : 'none'; }
function poll() { if (pollInterval) return; pollInterval = setInterval(async () => { if (document.hidden) return; try { await getState(); render(); } catch(e){} }, 6000); }

function checkPassword() {
  if (document.getElementById('inp-password').value === APP_PASSWORD) {
    sessionStorage.setItem('fo_auth','1');
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadState();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('inp-password').value = '';
    document.getElementById('inp-password').focus();
  }
}
function togglePw() { const i = document.getElementById('inp-password'); i.type = i.type==='password'?'text':'password'; }

if (sessionStorage.getItem('fo_auth') === '1') {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  loadState();
} else {
  document.getElementById('view-login').style.display = 'flex';
}
</script>
